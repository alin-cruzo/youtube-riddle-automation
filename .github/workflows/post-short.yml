name: Post YouTube Short

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  post-short:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 1

    - name: Debug - List files
      run: |
        echo "Current directory:"
        pwd
        echo "Files in root:"
        ls -la
        echo "Files in src:"
        ls -la src/

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg imagemagick

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        cat requirements.txt
        pip install -r requirements.txt

    - name: Generate and upload video
      env:
        YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      run: |
        python src/main.py

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generated-content
        path: |
          output/*.mp4
          output/*.png
        retention-days: 7

    - name: Persist riddle history (prevents repeats across runs)
      if: always()
      run: |
        git config user.name "riddle-bot"
        git config user.email "riddle-bot@users.noreply.github.com"
        git add riddles/history.json
        git diff --staged --quiet || git commit -m "Update riddle history [skip ci]"
        git push origin main || echo "Nothing to push or push failed, continuing"
